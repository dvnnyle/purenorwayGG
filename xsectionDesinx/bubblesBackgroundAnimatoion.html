<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Background Preview – Pure Norway</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #F4F8FA; overflow: hidden; }

  svg { width: 100%; height: 100%; position: fixed; inset: 0; }

  .b1  { animation: f1 18s ease-in-out infinite; }
  .b2  { animation: f2 24s ease-in-out infinite; }
  .b3  { animation: f3 14s ease-in-out infinite; }
  .b4  { animation: f1 20s ease-in-out infinite reverse; }
  .b5  { animation: f2 16s ease-in-out infinite; }
  .b6  { animation: f3 22s ease-in-out infinite reverse; }
  .b7  { animation: f1 13s ease-in-out infinite; }
  .b8  { animation: f2 19s ease-in-out infinite reverse; }
  .b9  { animation: f3 26s ease-in-out infinite; }
  .b10 { animation: f1 15s ease-in-out infinite reverse; }
  .b11 { animation: f2 21s ease-in-out infinite; }
  .b12 { animation: f3 17s ease-in-out infinite reverse; }
  .b13 { animation: f1 23s ease-in-out infinite; }
  .b14 { animation: f2 12s ease-in-out infinite reverse; }
  .b15 { animation: f3 28s ease-in-out infinite; }
  .b16 { animation: f1 16s ease-in-out infinite; }
  .b17 { animation: f2 11s ease-in-out infinite reverse; }
  .b18 { animation: f3 25s ease-in-out infinite; }

  @keyframes f1 {
    0%,100% { transform: translate(0, 0); }
    30%     { transform: translate(14px, -22px); }
    60%     { transform: translate(-10px, 16px); }
  }
  @keyframes f2 {
    0%,100% { transform: translate(0, 0); }
    40%     { transform: translate(-18px, 12px); }
    75%     { transform: translate(12px, -20px); }
  }
  @keyframes f3 {
    0%,100% { transform: translate(0, 0); }
    50%     { transform: translate(20px, 24px); }
  }
</style>
</head>
<body>

<svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">

  <!-- large filled blobs -->
  <circle class="b1"  cx="120"  cy="140"  r="110" fill="rgba(0,180,200,.07)" />
  <circle class="b2"  cx="1340" cy="180"  r="150" fill="rgba(0,180,200,.05)" />
  <circle class="b3"  cx="720"  cy="820"  r="120" fill="rgba(0,180,200,.06)" />
  <circle class="b4"  cx="180"  cy="720"  r="90"  fill="rgba(0,180,200,.05)" />
  <circle class="b5"  cx="1200" cy="660"  r="100" fill="rgba(0,180,200,.05)" />
  <circle class="b16" cx="600"  cy="300"  r="80"  fill="rgba(0,180,200,.04)" />

  <!-- medium outline rings -->
  <circle class="b6"  cx="380"  cy="240"  r="55"  fill="none" stroke="rgba(0,180,200,.2)"  stroke-width="1.5"/>
  <circle class="b7"  cx="1060" cy="110"  r="38"  fill="none" stroke="rgba(0,180,200,.18)" stroke-width="1.5"/>
  <circle class="b8"  cx="860"  cy="420"  r="28"  fill="none" stroke="rgba(0,180,200,.22)" stroke-width="1.2"/>
  <circle class="b9"  cx="520"  cy="660"  r="48"  fill="none" stroke="rgba(0,180,200,.16)" stroke-width="1.5"/>
  <circle class="b10" cx="1360" cy="520"  r="36"  fill="none" stroke="rgba(0,180,200,.18)" stroke-width="1.2"/>
  <circle class="b11" cx="80"   cy="480"  r="24"  fill="none" stroke="rgba(0,180,200,.22)" stroke-width="1"/>
  <circle class="b12" cx="680"  cy="160"  r="18"  fill="none" stroke="rgba(0,180,200,.2)"  stroke-width="1"/>
  <circle class="b17" cx="950"  cy="760"  r="42"  fill="none" stroke="rgba(0,180,200,.15)" stroke-width="1.5"/>
  <circle class="b18" cx="300"  cy="400"  r="30"  fill="none" stroke="rgba(0,180,200,.18)" stroke-width="1"/>

  <!-- small dots -->
  <circle class="b13" cx="290"  cy="540"  r="6"   fill="rgba(0,180,200,.28)"/>
  <circle class="b14" cx="1120" cy="360"  r="5"   fill="rgba(0,180,200,.24)"/>
  <circle class="b15" cx="770"  cy="580"  r="7"   fill="rgba(0,180,200,.2)"/>
  <circle cx="440"  cy="780"  r="4"   fill="rgba(0,180,200,.22)"/>
  <circle cx="1250" cy="840"  r="5"   fill="rgba(0,180,200,.18)"/>
  <circle cx="150"  cy="320"  r="4"   fill="rgba(0,180,200,.25)"/>

</svg>

</body>
</html>
