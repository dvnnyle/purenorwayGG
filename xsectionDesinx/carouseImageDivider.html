<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Carousel – Pure Norway</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,900;1,700&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --teal:#00B4C8; --navy:#0D1B2A; --white:#FFFFFF;
    --muted:#6B8090; --border:#DDE8EE;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:#eef2f5}

  /* ── CAROUSEL ── */
  .carousel { position:relative; height:480px; overflow:hidden; }

  .slide {
    position:absolute; inset:0;
    opacity:0; transition:opacity 1.2s ease;
    pointer-events:none;
  }
  .slide.active { opacity:1; pointer-events:all; }

  .slide img {
    width:100%; height:100%; object-fit:cover; display:block;
    transform:scale(1.04);
    transition:transform 6s ease;
  }
  .slide.active img { transform:scale(1); }

  /* dark gradient overlay */
  .slide::after {
    content:''; position:absolute; inset:0;
    background:linear-gradient(to top, rgba(13,27,42,.65) 0%, rgba(13,27,42,.1) 50%, transparent 100%);
  }

  /* caption */
  .slide-caption {
    position:absolute; bottom:40px; left:56px; right:56px;
    z-index:2;
    display:flex; align-items:flex-end; justify-content:space-between;
  }
  .caption-text { max-width:480px; }
  .caption-eyebrow {
    font-size:10px; font-weight:700; letter-spacing:3px;
    text-transform:uppercase; color:var(--teal);
    margin-bottom:8px; display:block;
    opacity:0; transform:translateY(10px);
    transition:opacity .6s .3s ease, transform .6s .3s ease;
  }
  .caption-title {
    font-family:'Fraunces',serif;
    font-size:clamp(22px,3vw,38px); font-weight:900; font-style:italic;
    color:#fff; letter-spacing:-.5px; line-height:1.1;
    opacity:0; transform:translateY(14px);
    transition:opacity .6s .5s ease, transform .6s .5s ease;
  }
  .slide.active .caption-eyebrow,
  .slide.active .caption-title { opacity:1; transform:translateY(0); }

  /* counter */
  .slide-counter {
    font-size:13px; font-weight:700;
    color:rgba(255,255,255,.5); letter-spacing:1px;
    z-index:2;
  }
  .slide-counter span { color:#fff; }

  /* dots */
  .dots {
    position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
    display:flex; gap:8px; z-index:3;
  }
  .dot {
    width:6px; height:6px; border-radius:50%;
    background:rgba(255,255,255,.3); cursor:pointer;
    transition:background .3s, transform .3s;
  }
  .dot.active { background:var(--teal); transform:scale(1.3); }

  /* arrow buttons */
  .arrow {
    position:absolute; top:50%; transform:translateY(-50%);
    z-index:3; width:42px; height:42px; border-radius:50%;
    background:rgba(255,255,255,.1); backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.2);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:background .2s;
  }
  .arrow:hover { background:rgba(0,180,200,.3); border-color:rgba(0,180,200,.4); }
  .arrow svg { width:16px; height:16px; fill:#fff; }
  .arrow.prev { left:20px; }
  .arrow.next { right:20px; }

  /* progress bar */
  .progress {
    position:absolute; bottom:0; left:0; height:3px;
    background:var(--teal); z-index:3;
    width:0%; transition:width linear;
  }
</style>
</head>
<body>

<div class="carousel">

  <!-- slides -->
  <div class="slide active">
    <img src="https://images.unsplash.com/photo-1501854140801-50d01698950b?w=1400&h=600&fit=crop" alt="Norwegian nature">
    <div class="slide-caption">
      <div class="caption-text">
        <span class="caption-eyebrow">Ancient Norwegian Source</span>
        <div class="caption-title">Where nature does<br>the filtering.</div>
      </div>
      <div class="slide-counter"><span>01</span> / 04</div>
    </div>
  </div>

  <div class="slide">
    <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1400&h=600&fit=crop" alt="Fjord">
    <div class="slide-caption">
      <div class="caption-text">
        <span class="caption-eyebrow">The Fjords of Norway</span>
        <div class="caption-title">Carved by glaciers,<br>preserved for you.</div>
      </div>
      <div class="slide-counter"><span>02</span> / 04</div>
    </div>
  </div>

  <div class="slide">
    <img src="https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?w=1400&h=600&fit=crop" alt="Ocean">
    <div class="slide-caption">
      <div class="caption-text">
        <span class="caption-eyebrow">Ocean Cleanup Mission</span>
        <div class="caption-title">1% of turnover to<br>protect our oceans.</div>
      </div>
      <div class="slide-counter"><span>03</span> / 04</div>
    </div>
  </div>

  <div class="slide">
    <img src="https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=1400&h=600&fit=crop" alt="Mountains">
    <div class="slide-caption">
      <div class="caption-text">
        <span class="caption-eyebrow">I CARE</span>
        <div class="caption-title">Pure Norwegian.<br>Pure You.</div>
      </div>
      <div class="slide-counter"><span>04</span> / 04</div>
    </div>
  </div>

  <!-- dots -->
  <div class="dots">
    <div class="dot active" onclick="goTo(0)"></div>
    <div class="dot" onclick="goTo(1)"></div>
    <div class="dot" onclick="goTo(2)"></div>
    <div class="dot" onclick="goTo(3)"></div>
  </div>

  <!-- arrows -->
  <div class="arrow prev" onclick="prev()">
    <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
  </div>
  <div class="arrow next" onclick="next()">
    <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
  </div>

  <!-- progress bar -->
  <div class="progress" id="progress"></div>

</div>

<script>
  let current = 0;
  const slides = document.querySelectorAll('.slide');
  const dots   = document.querySelectorAll('.dot');
  const bar    = document.getElementById('progress');
  const total  = slides.length;
  const delay  = 5000;
  let timer, barTimer;

  function goTo(n) {
    slides[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = (n + total) % total;
    slides[current].classList.add('active');
    dots[current].classList.add('active');
    resetProgress();
  }

  function next() { goTo(current + 1); }
  function prev() { goTo(current - 1); }

  function resetProgress() {
    clearInterval(timer); clearTimeout(barTimer);
    bar.style.transition = 'none';
    bar.style.width = '0%';
    requestAnimationFrame(() => {
      bar.style.transition = `width ${delay}ms linear`;
      bar.style.width = '100%';
    });
    timer = setTimeout(next, delay);
  }

  resetProgress();
</script>

</body>
</html>
