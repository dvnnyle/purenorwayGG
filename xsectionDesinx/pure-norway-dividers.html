<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divider Options – Pure Norway</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,900&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root { --teal:#00B4C8; --navy:#0D1B2A; --muted:#6B8090; --border:#DDE8EE; --off-white:#F4F8FA; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--off-white);padding:48px 40px}
  h1{font-family:'Fraunces',serif;font-size:28px;font-weight:900;color:var(--navy);margin-bottom:8px}
  .sub{font-size:14px;color:var(--muted);margin-bottom:48px}

  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .option{background:#fff;border:1px solid var(--border);border-radius:16px;padding:36px 28px;text-align:center;cursor:pointer;transition:border-color .2s,box-shadow .2s}
  .option:hover{border-color:var(--teal);box-shadow:0 8px 28px rgba(0,0,0,.07)}
  .label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:28px}
  .divider-preview{display:flex;align-items:center;justify-content:center;height:32px;margin-bottom:0}

  /* A — line + center dot */
  .a-div{display:flex;align-items:center;gap:0;width:180px}
  .a-div .line{flex:1;height:2px;background:var(--teal)}
  .a-div .dot{width:10px;height:10px;border-radius:50%;background:var(--teal);flex-shrink:0;margin:0 4px}

  /* B — three dots */
  .b-div{display:flex;align-items:center;gap:10px}
  .b-div span{width:8px;height:8px;border-radius:50%;background:var(--teal);display:block}
  .b-div span:nth-child(2){opacity:.5}
  .b-div span:nth-child(3){opacity:.25}

  /* C — wave SVG */
  .c-div svg{width:120px;height:20px}

  /* D — short bold line */
  .d-div{width:48px;height:4px;background:var(--teal);border-radius:4px}

  /* E — line dash dash */
  .e-div{display:flex;align-items:center;gap:6px}
  .e-div .long{width:60px;height:2px;background:var(--teal);border-radius:2px}
  .e-div .short{width:12px;height:2px;background:var(--teal);border-radius:2px;opacity:.4}

  /* F — leaf icon */
  .f-div svg{width:28px;height:28px;fill:var(--teal);opacity:.7}

  /* G — diamond */
  .g-div{display:flex;align-items:center;gap:8px;width:180px}
  .g-div .line{flex:1;height:1.5px;background:var(--teal);opacity:.4}
  .g-div .diamond{width:10px;height:10px;background:var(--teal);transform:rotate(45deg);flex-shrink:0}

  /* H — circle ring */
  .h-div{display:flex;align-items:center;gap:8px;width:180px}
  .h-div .line{flex:1;height:1.5px;background:var(--teal);opacity:.35}
  .h-div .ring{width:14px;height:14px;border-radius:50%;border:2.5px solid var(--teal);flex-shrink:0}

  /* I — Norway flag–inspired */
  .i-div{display:flex;align-items:center;gap:0;width:180px}
  .i-div .seg{flex:1;height:3px;border-radius:2px}
  .i-div .seg.red{background:#EF3340}
  .i-div .seg.white{background:#fff;width:4px;flex:none}
  .i-div .seg.blue{background:#002868}
</style>
</head>
<body>

<h1>Divider Options</h1>
<p class="sub">Pick your favourite — tell me the letter and I'll apply it.</p>

<div class="grid">

  <div class="option">
    <div class="label">A — Line with center dot</div>
    <div class="divider-preview">
      <div class="a-div"><div class="line"></div><div class="dot"></div><div class="line"></div></div>
    </div>
  </div>

  <div class="option">
    <div class="label">B — Fading dots</div>
    <div class="divider-preview">
      <div class="b-div"><span></span><span></span><span></span></div>
    </div>
  </div>

  <div class="option">
    <div class="label">C — Wave</div>
    <div class="divider-preview">
      <div class="c-div">
        <svg viewBox="0 0 120 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0 10 C15 2, 25 18, 40 10 C55 2, 65 18, 80 10 C95 2, 105 18, 120 10" stroke="#00B4C8" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="option">
    <div class="label">D — Bold short line</div>
    <div class="divider-preview">
      <div class="d-div"></div>
    </div>
  </div>

  <div class="option">
    <div class="label">E — Long + short dashes</div>
    <div class="divider-preview">
      <div class="e-div"><div class="short"></div><div class="long"></div><div class="short"></div></div>
    </div>
  </div>

  <div class="option">
    <div class="label">F — Leaf icon</div>
    <div class="divider-preview">
      <div class="f-div">
        <svg viewBox="0 0 24 24"><path d="M17 8C8 10 5.9 16.17 3.82 21.34L5.71 22l1-2.3A4.49 4.49 0 0 0 8 20C19 20 22 3 22 3c-1 2-8 2-12 2 0 0-4 0-4 4 0 3 2.5 4.5 2.5 4.5C4.5 15 4 16 4 16c0-3 2-5 2-5 4-2 11-4 11-3z"/></svg>
      </div>
    </div>
  </div>

  <div class="option">
    <div class="label">G — Line with diamond</div>
    <div class="divider-preview">
      <div class="g-div"><div class="line"></div><div class="diamond"></div><div class="line"></div></div>
    </div>
  </div>

  <div class="option">
    <div class="label">H — Line with ring</div>
    <div class="divider-preview">
      <div class="h-div"><div class="line"></div><div class="ring"></div><div class="line"></div></div>
    </div>
  </div>

  <div class="option">
    <div class="label">I — Norwegian flag colours</div>
    <div class="divider-preview">
      <div class="i-div">
        <div class="seg red" style="flex:3"></div>
        <div class="seg white"></div>
        <div class="seg blue" style="flex:1"></div>
        <div class="seg white"></div>
        <div class="seg red" style="flex:3"></div>
      </div>
    </div>
  </div>

</div>

</body>
</html>
