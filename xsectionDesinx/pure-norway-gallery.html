<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery – Pure Norway</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,900;1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --teal:#00B4C8; --teal-dark:#007A8C; --teal-dim:rgba(0,180,200,.1);
    --navy:#0D1B2A; --off-white:#F4F8FA; --white:#FFFFFF;
    --text:#182530; --muted:#6B8090; --border:#DDE8EE;
    --no-red:#EF3340; --no-blue:#002868;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--text)}

  /* ── FILTER BAR ── */
  .filter-bar{border-bottom:1px solid var(--border);background:var(--white);position:sticky;top:0;z-index:100}
  .filter-inner{max-width:1160px;margin:0 auto;padding:0 56px;display:flex;align-items:center;gap:6px;overflow-x:auto}
  .filter-btn{flex-shrink:0;padding:14px 18px;font-size:12px;font-weight:700;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'DM Sans',sans-serif;transition:color .15s,border-color .15s;white-space:nowrap}
  .filter-btn:hover{color:var(--text)}
  .filter-btn.active{color:var(--teal);border-bottom-color:var(--teal)}

  /* ── MAIN ── */
  .main{max-width:1160px;margin:0 auto;padding:48px 56px 96px}

  /* featured strip — 3 col unequal */
  .featured-grid {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    grid-template-rows: 260px 260px;
    gap: 6px;
    margin-bottom: 48px;
    border-radius: 14px;
    overflow: hidden;
  }
  .feat-img {
    position: relative; overflow: hidden; cursor: pointer;
  }
  .feat-img.tall { grid-row: span 2; }
  .feat-img img {
    width:100%; height:100%; object-fit:cover; display:block;
    transition: transform .5s ease;
  }
  .feat-img:hover img { transform: scale(1.05); }
  .feat-img .overlay {
    position:absolute; inset:0;
    background:linear-gradient(to top, rgba(13,27,42,.55) 0%, transparent 55%);
    opacity:0; transition:opacity .3s;
    display:flex; align-items:flex-end; padding:20px;
  }
  .feat-img:hover .overlay { opacity:1; }
  .overlay-tag {
    font-size:10px; font-weight:700; letter-spacing:1.5px;
    text-transform:uppercase; color:#fff;
    background:rgba(0,180,200,.7); border-radius:100px;
    padding:3px 10px;
  }

  /* section label */
  .section-label {
    font-size:11px; font-weight:700; letter-spacing:2.5px;
    text-transform:uppercase; color:var(--muted); margin-bottom:20px;
    display:flex; align-items:center; gap:14px;
  }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

  /* masonry-style grid */
  .gallery-grid {
    columns: 3;
    column-gap: 12px;
  }
  .gallery-item {
    break-inside: avoid;
    margin-bottom: 12px;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    display: block;
  }
  .gallery-item img {
    width:100%; display:block;
    transition: transform .45s ease;
  }
  .gallery-item:hover img { transform: scale(1.05); }
  .gallery-item .item-overlay {
    position:absolute; inset:0;
    background:linear-gradient(to top, rgba(13,27,42,.6) 0%, transparent 50%);
    opacity:0; transition:opacity .3s;
    display:flex; align-items:flex-end; padding:14px 16px;
    gap:8px;
  }
  .gallery-item:hover .item-overlay { opacity:1; }
  .item-tag {
    font-size:9px; font-weight:700; letter-spacing:1.5px;
    text-transform:uppercase; color:#fff;
    background:rgba(0,0,0,.3); backdrop-filter:blur(4px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:100px; padding:3px 10px;
  }

  /* lightbox */
  .lightbox {
    display:none; position:fixed; inset:0; z-index:1000;
    background:rgba(13,27,42,.92); backdrop-filter:blur(8px);
    align-items:center; justify-content:center; padding:40px;
  }
  .lightbox.open { display:flex; }
  .lightbox-img {
    max-width:900px; max-height:85vh;
    border-radius:12px; object-fit:contain;
    box-shadow:0 32px 80px rgba(0,0,0,.5);
  }
  .lightbox-close {
    position:fixed; top:24px; right:28px;
    width:40px; height:40px; border-radius:50%;
    background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.15);
    color:#fff; font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:background .2s;
  }
  .lightbox-close:hover { background:rgba(255,255,255,.2); }
  .lightbox-caption {
    position:fixed; bottom:32px; left:50%; transform:translateX(-50%);
    font-size:12px; color:rgba(255,255,255,.5); letter-spacing:.5px;
  }

  /* load more */
  .load-more{text-align:center;margin-top:40px}
  .load-btn{display:inline-flex;align-items:center;gap:8px;background:var(--white);color:var(--text);border:1.5px solid var(--border);padding:12px 28px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:border-color .2s,color .2s}
  .load-btn:hover{border-color:var(--teal);color:var(--teal)}

  @media(max-width:768px){
    .gallery-grid{columns:2}
    .featured-grid{grid-template-columns:1fr;grid-template-rows:240px 180px 180px}
    .feat-img.tall{grid-row:span 1}
    .main{padding:32px 20px 64px}
    .filter-inner{padding:0 20px}
  }
</style>
</head>
<body>

<!-- FILTER BAR -->
<div class="filter-bar">
  <div class="filter-inner">
    <button class="filter-btn active">All</button>
    <button class="filter-btn">Nature</button>
    <button class="filter-btn">Products</button>
    <button class="filter-btn">Events</button>
    <button class="filter-btn">Ocean</button>
    <button class="filter-btn">Behind the scenes</button>
  </div>
</div>

<div class="main">

  <!-- FEATURED -->
  <div class="featured-grid">
    <div class="feat-img tall">
      <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&h=600&fit=crop" alt="Fjord">
      <div class="overlay"><span class="overlay-tag">Nature</span></div>
    </div>
    <div class="feat-img">
      <img src="https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=600&h=300&fit=crop" alt="Mountains">
      <div class="overlay"><span class="overlay-tag">Nature</span></div>
    </div>
    <div class="feat-img">
      <img src="https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?w=600&h=300&fit=crop" alt="Ocean">
      <div class="overlay"><span class="overlay-tag">Ocean</span></div>
    </div>
  </div>

  <!-- MASONRY GRID -->
  <div class="section-label">All Photos</div>
  <div class="gallery-grid">

    <div class="gallery-item" onclick="openLight(this)">
      <img src="https://images.unsplash.com/photo-1501854140801-50d01698950b?w=600&h=400&fit=crop" alt="Nature">
      <div class="item-overlay"><span class="item-tag">Nature</span></div>
    </div>

    <div class="gallery-item" onclick="openLight(this)">
      <img src="https://images.unsplash.com/photo-1508193638397-1c4234db14d8?w=600&h=750&fit=crop" alt="Fjord">
      <div class="item-overlay"><span class="item-tag">Nature</span></div>
    </div>

    <div class="gallery-item" onclick="openLight(this)">
      <img src="https://images.unsplash.com/photo-1532996122724-e3c354a0b15b?w=600&h=400&fit=crop" alt="Recycling">
      <div class="item-overlay"><span class="item-tag">Behind the scenes</span></div>
    </div>

    <div class="gallery-item" onclick="openLight(this)">
      <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&h=500&fit=crop" alt="Fjord 2">
      <div class="item-overlay"><span class="item-tag">Nature</span></div>
    </div>

    <div class="gallery-item" onclick="openLight(this)">
      <img src="https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?w=600&h=400&fit=crop" alt="Ocean 2">
      <div class="item-overlay"><span class="item-tag">Ocean</span></div>
    </div>

    <div class="gallery-item" onclick="openLight(this)">
      <img src="https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=600&h=800&fit=crop" alt="Mountains 2">
      <div class="item-overlay"><span class="item-tag">Nature</span></div>
    </div>

    <div class="gallery-item" onclick="openLight(this)">
      <img src="https://images.unsplash.com/photo-1556679343-c7306c1976bc?w=600&h=400&fit=crop" alt="Water">
      <div class="item-overlay"><span class="item-tag">Products</span></div>
    </div>

    <div class="gallery-item" onclick="openLight(this)">
      <img src="https://images.unsplash.com/photo-1501854140801-50d01698950b?w=600&h=550&fit=crop" alt="Norway">
      <div class="item-overlay"><span class="item-tag">Nature</span></div>
    </div>

    <div class="gallery-item" onclick="openLight(this)">
      <img src="https://images.unsplash.com/photo-1508193638397-1c4234db14d8?w=600&h=380&fit=crop" alt="Fjord 3">
      <div class="item-overlay"><span class="item-tag">Nature</span></div>
    </div>

  </div>

  <div class="load-more">
    <button class="load-btn">Load more photos</button>
  </div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLight(event)">
  <span class="lightbox-close" onclick="closeLightDirect()">✕</span>
  <img class="lightbox-img" id="lightbox-img" src="" alt="">
  <div class="lightbox-caption" id="lightbox-caption"></div>
</div>

<script>
  // filters
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // lightbox
  function openLight(el) {
    const img = el.querySelector('img');
    const tag = el.querySelector('.item-tag');
    document.getElementById('lightbox-img').src = img.src.replace(/w=\d+&h=\d+/, 'w=1200&h=900');
    document.getElementById('lightbox-caption').textContent = tag ? tag.textContent : '';
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLight(e) {
    if (e.target === document.getElementById('lightbox')) closeLightDirect();
  }
  function closeLightDirect() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => { if(e.key === 'Escape') closeLightDirect(); });
</script>

</body>
</html>
