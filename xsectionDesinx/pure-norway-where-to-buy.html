<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Where to Buy – Pure Norway</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,900;1,900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --teal:#00B4C8; --teal-dark:#007A8C; --teal-dim:rgba(0,180,200,.1);
    --navy:#0D1B2A; --off-white:#F4F8FA; --white:#FFFFFF;
    --text:#182530; --muted:#6B8090; --border:#DDE8EE;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--white)}

  .section {
    padding: 80px 56px;
    background: var(--white);
    border-top: 1px solid var(--border);
  }
  .inner { max-width: 1160px; margin: 0 auto; }

  /* header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 32px; margin-bottom: 52px;
  }
  .left {}
  .eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 10px; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; color: var(--teal); margin-bottom: 14px;
  }
  .eyebrow::before,.eyebrow::after { content:''; width:20px; height:1px; background:var(--teal); }
  h2 {
    font-family: 'Fraunces', serif;
    font-size: clamp(26px, 3vw, 42px);
    font-weight: 900; letter-spacing: -1.2px; line-height: .95; color: var(--navy);
  }
  h2 em { color: var(--teal); font-style: italic; }
  .sub {
    font-size: 13px; color: var(--muted); max-width: 260px; line-height: 1.7; text-align: right;
  }

  /* logo row */
  .logos {
    display: flex; align-items: center;
    gap: 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  .logo-item {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 36px 24px;
    border-right: 1px solid var(--border);
    transition: background .2s;
    cursor: pointer;
    text-decoration: none;
  }
  .logo-item:last-child { border-right: none; }
  .logo-item:hover { background: var(--off-white); }

  /* placeholder logo */
  .logo-placeholder {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .logo-box {
    width: 100px; height: 40px;
    background: var(--border);
    border-radius: 6px;
    opacity: .4;
    transition: opacity .2s;
  }
  .logo-item:hover .logo-box { opacity: .7; }
  .logo-name {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--muted);
    transition: color .2s;
  }
  .logo-item:hover .logo-name { color: var(--teal); }

  /* bottom */
  .bottom {
    margin-top: 28px;
    display: flex; align-items: center; justify-content: space-between; gap: 24px;
  }
  .bottom-note { font-size: 13px; color: var(--muted); }
  .bottom-note strong { color: var(--text); }
  .link {
    font-size: 13px; font-weight: 700; color: var(--teal);
    text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
    transition: gap .2s;
  }
  .link:hover { gap: 10px; }

  @media(max-width:700px){
    .logos{flex-wrap:wrap}
    .logo-item{flex:1 1 50%;border-bottom:1px solid var(--border)}
    .header{flex-direction:column;align-items:flex-start}
    .sub{text-align:left}
    .section{padding:56px 24px}
  }
</style>
</head>
<body>

<section class="section">
  <div class="inner">

    <div class="header">
      <div class="left">
        <div class="eyebrow">Stockists</div>
        <h2>Find us <em>in store.</em></h2>
      </div>
      <p class="sub">Currently available at 4 locations across Norway. More coming soon.</p>
    </div>

    <div class="logos">
      <a class="logo-item" href="#">
        <div class="logo-placeholder">
          <div class="logo-box"></div>
          <span class="logo-name">Store name</span>
        </div>
      </a>
      <a class="logo-item" href="#">
        <div class="logo-placeholder">
          <div class="logo-box"></div>
          <span class="logo-name">Store name</span>
        </div>
      </a>
      <a class="logo-item" href="#">
        <div class="logo-placeholder">
          <div class="logo-box"></div>
          <span class="logo-name">Store name</span>
        </div>
      </a>
      <a class="logo-item" href="#">
        <div class="logo-placeholder">
          <div class="logo-box"></div>
          <span class="logo-name">Store name</span>
        </div>
      </a>
    </div>

    <div class="bottom">
      <p class="bottom-note"><strong>Want to carry Pure Norway?</strong> We'd love to work with you.</p>
      <a href="#" class="link">Become a stockist →</a>
    </div>

  </div>
</section>

</body>
</html>
