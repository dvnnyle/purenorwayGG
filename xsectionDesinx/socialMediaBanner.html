<!DOCTYPE html>

<head>

<title>Social – Pure Norway</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --teal:     #00B4C8;
    --teal-dark:#007A8C;
    --navy:     #0D1B2A;
    --off-white:#F4F8FA;
    --white:    #FFFFFF;
    --text:     #182530;
    --muted:    #6B8090;
    --border:   #DDE8EE;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--off-white); }

  .social-section { background: var(--white); padding: 72px 56px; border-top: 1px solid var(--border); }
  .social-inner { max-width: 1160px; margin: 0 auto; display: flex; align-items: center; gap: 56px; }

  .social-text { flex-shrink: 0; min-width: 160px; }
  .social-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--teal); margin-bottom: 10px; }
  .social-text h2 { font-family: 'Fraunces', serif; font-size: clamp(20px, 2.2vw, 30px); font-weight: 900; letter-spacing: -.8px; line-height: 1.1; margin-bottom: 6px; }
  .social-text h2 em { color: var(--teal); font-style: italic; }
  .social-text p { font-size: 13px; color: var(--muted); line-height: 1.6; }

  .social-handle {
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    background: var(--off-white); border: 1.5px solid var(--border);
    border-radius: 100px; padding: 9px 18px 9px 12px;
    font-size: 13px; font-weight: 700; color: var(--text);
    text-decoration: none; white-space: nowrap;
    transition: border-color .2s, box-shadow .2s;
  }
  .social-handle:hover { border-color: var(--teal); box-shadow: 0 4px 16px rgba(0,180,200,.12); }
  .social-handle-at { color: var(--teal); }
  .social-handle-avatar {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, var(--teal), var(--teal-dark));
    display: flex; align-items: center; justify-content: center; font-size: 13px;
  }

  .social-links { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; flex: 1; }

  .social-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border-radius: 12px; text-decoration: none;
    color: var(--text); border: 1.5px solid var(--border); background: var(--white);
    transition: all .2s;
  }
  .social-btn svg { width: 17px; height: 17px; flex-shrink: 0; }
  .social-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,.08); }
  .social-btn-label { display: flex; flex-direction: column; line-height: 1; gap: 2px; }
  .social-btn-label .sub  { font-size: 10.5px; font-weight: 500; color: var(--muted); }
  .social-btn-label .name { font-size: 13px; font-weight: 700; color: inherit; }

  .social-btn.instagram:hover { border-color: #E1306C; color: #E1306C; }
  .social-btn.tiktok:hover    { border-color: #111;    color: #111; }
  .social-btn.facebook:hover  { border-color: #1877F2; color: #1877F2; }
  .social-btn.x:hover         { border-color: #111;    color: #111; }
  .social-btn.snapchat:hover  { border-color: #F7C800; background: #FFFC00; color: #333; }
  .social-btn.linkedin:hover  { border-color: #0A66C2; color: #0A66C2; }

  @media (max-width: 1100px) {
    .social-inner { flex-wrap: wrap; gap: 32px; }
    .social-links { grid-template-columns: repeat(3, 1fr); width: 100%; }
  }
  @media (max-width: 700px) {
    .social-section { padding: 56px 20px; }
    .social-links { grid-template-columns: repeat(2, 1fr); }
    .social-handle { width: 100%; justify-content: center; }
  }
</style>
</head>
