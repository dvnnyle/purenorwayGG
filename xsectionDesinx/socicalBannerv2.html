<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Social v2 – Pure Norway</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --teal:     #00B4C8;
    --teal-dark:#007A8C;
    --navy:     #0D1B2A;
    --off-white:#F4F8FA;
    --white:    #FFFFFF;
    --text:     #182530;
    --muted:    #6B8090;
    --border:   #DDE8EE;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--navy); }

  /* ── SECTION ── */
  .social-section {
    background: var(--navy); padding: 80px 56px;
    position: relative; overflow: hidden;
  }

  /* subtle aurora glow */
  .social-section::before {
    content: ''; position: absolute;
    width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,180,200,.1) 0%, transparent 65%);
    top: -150px; right: -100px; pointer-events: none;
  }

  .social-inner { max-width: 1160px; margin: 0 auto; position: relative; }

  /* ── TOP: heading + handle ── */
  .social-top {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 48px; gap: 24px;
  }
  .social-eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: 2.5px;
    text-transform: uppercase; color: var(--teal); margin-bottom: 12px;
  }
  .social-top h2 {
    font-family: 'Fraunces', serif;
    font-size: clamp(30px, 4vw, 52px); font-weight: 900;
    color: #fff; letter-spacing: -1.5px; line-height: .98;
  }
  .social-top h2 em { color: var(--teal); font-style: italic; }

  .handle-pill {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12);
    border-radius: 100px; padding: 12px 22px 12px 14px;
    text-decoration: none; flex-shrink: 0;
    transition: border-color .2s, background .2s;
  }
  .handle-pill:hover { border-color: var(--teal); background: rgba(0,180,200,.08); }
  .handle-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--teal), var(--teal-dark));
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .handle-text { display: flex; flex-direction: column; gap: 1px; }
  .handle-text .lbl { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,.35); }
  .handle-text .name { font-size: 14px; font-weight: 700; color: #fff; }
  .handle-text .name span { color: var(--teal); }

  /* ── PLATFORM CARDS ── */
  .social-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
  }

  .plat-card {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; padding: 28px 16px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 18px; text-decoration: none;
    color: rgba(255,255,255,.6);
    transition: all .22s; position: relative; overflow: hidden;
  }
  .plat-card::after {
    content: ''; position: absolute; inset: 0; opacity: 0;
    transition: opacity .22s;
  }
  .plat-card:hover { transform: translateY(-4px); color: #fff; }
  .plat-card:hover::after { opacity: 1; }

  /* per-platform glow colours */
  .plat-card.instagram::after { background: linear-gradient(135deg, rgba(225,48,108,.12), rgba(253,190,91,.08)); }
  .plat-card.instagram:hover  { border-color: rgba(225,48,108,.4); box-shadow: 0 12px 32px rgba(225,48,108,.15); }

  .plat-card.tiktok::after { background: linear-gradient(135deg, rgba(0,0,0,.2), rgba(105,201,208,.1)); }
  .plat-card.tiktok:hover  { border-color: rgba(105,201,208,.4); box-shadow: 0 12px 32px rgba(0,0,0,.3); }

  .plat-card.facebook::after { background: linear-gradient(135deg, rgba(24,119,242,.12), transparent); }
  .plat-card.facebook:hover  { border-color: rgba(24,119,242,.4); box-shadow: 0 12px 32px rgba(24,119,242,.15); }

  .plat-card.x::after { background: linear-gradient(135deg, rgba(255,255,255,.06), transparent); }
  .plat-card.x:hover  { border-color: rgba(255,255,255,.25); box-shadow: 0 12px 32px rgba(0,0,0,.3); }

  .plat-card.snapchat::after { background: linear-gradient(135deg, rgba(255,252,0,.12), transparent); }
  .plat-card.snapchat:hover  { border-color: rgba(255,252,0,.4); box-shadow: 0 12px 32px rgba(255,252,0,.1); }

  .plat-card.linkedin::after { background: linear-gradient(135deg, rgba(10,102,194,.15), transparent); }
  .plat-card.linkedin:hover  { border-color: rgba(10,102,194,.5); box-shadow: 0 12px 32px rgba(10,102,194,.2); }

  .plat-icon {
    width: 44px; height: 44px; border-radius: 14px;
    background: rgba(255,255,255,.07);
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 1; transition: background .22s;
    flex-shrink: 0;
  }
  .plat-card:hover .plat-icon { background: rgba(255,255,255,.12); }
  .plat-icon svg { width: 20px; height: 20px; fill: currentColor; }

  .plat-info { text-align: center; position: relative; z-index: 1; }
  .plat-name { font-size: 13px; font-weight: 700; color: inherit; margin-bottom: 2px; }
  .plat-action { font-size: 11px; color: rgba(255,255,255,.3); font-weight: 500; }
  .plat-card:hover .plat-action { color: rgba(255,255,255,.5); }

  /* ── BOTTOM STRIP ── */
  .social-bottom {
    margin-top: 32px; padding-top: 28px;
    border-top: 1px solid rgba(255,255,255,.07);
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .social-bottom p { font-size: 13px; color: rgba(255,255,255,.3); line-height: 1.6; }
  .social-bottom p strong { color: rgba(255,255,255,.6); font-weight: 600; }
  .hashtag {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .tag {
    background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08);
    border-radius: 100px; padding: 6px 14px;
    font-size: 12px; font-weight: 600; color: var(--teal);
    transition: background .2s;
  }
  .tag:hover { background: rgba(0,180,200,.1); }

  @media (max-width: 1024px) {
    .social-grid { grid-template-columns: repeat(3, 1fr); }
    .social-top { flex-direction: column; align-items: flex-start; }
  }
  @media (max-width: 700px) {
    .social-section { padding: 56px 20px; }
    .social-grid { grid-template-columns: repeat(2, 1fr); }
    .social-bottom { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
